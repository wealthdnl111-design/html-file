<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <!-- Semantic Table -->

     <br>
     <caption>Workers</caption>
     <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Occupation</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John</td>
                <td>25</td>
                <td>Male</td>
                <td>Teacher</td>
            </tr>
            <tr>
                <td>Mary</td>
                <td>22</td>
                <td>Female</td>
                <td>Nurse</td>
            </tr>
            <tr>
                <td>David</td>
                <td>30</td>
                <td>Male</td>
                <td>Programmer</td>
            </tr>
            <tr>
                <td>Grace</td>
                <td>27</td>
                <td>Female</td>
                <td>Accountant</td>
            </tr>
        </tbody>
     </table>
</body>
</html>
