<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1><u>Lists</u></h1>
    <!-- Ordered List -->
     <h2>Five Programming Languages</h2>
    <ol>
        <li>Python</li>
        <li>JavaScript</li>
        <li>C++</li>
        <li>Java</li>
        <li>C#</li>
    </ol>
<!-- Unordered List -->
    <h2>Five States In Nigeria</h2>
    <ul>
        <li>Enugu</li>
        <li>Anambra</li>
        <li>Nasarawa</li>
        <li>Ondo</li>
        <li>Delta</li>
    </ul>
</body>
</html>
