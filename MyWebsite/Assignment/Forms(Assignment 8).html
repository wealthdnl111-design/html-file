<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <!-- Registration Form -->
      <h2>Registration Form</h2>
     <form>

        <!-- Full Name -->

        <label for="name">Full Name:</label>
            <input type="text"
                id="name" 
                name="name"
                placeholder="Enter your full name">
        <br><br>

        <!-- Email -->

        <label for="email">Email:</label>
            <input type="email"
                id="email"
                name="email"
                placeholder="example@gmail.com">
        <br><br>

        <!-- Passowrd -->

        <label for="password">Password:</label>
            <input type="password"
                id="password"
                name="password"
                placeholder="Enter Password"><br><br>

        <!-- Phone No. -->

        <label for="phone">Phone Number:</label>
            <input type="tel"
                id="phone"
                placeholder="Enter Phone No."><br><br>

        <!-- Gender Selection -->

        <label for="Male"> Male:</label>
            <input type="radio"
                id="Male"
                name="Gender">
        <label for="Female"> Female:</label>
            <input type="radio"
                id="Female"
                name="Gender"><br><br>

        <!-- State Of Origin -->


        <label for="State">State Of Origin:</label>
            <select id="State"
                name="State">
                <option value="Abia">Abia</option>
                <option value="Anambra">Anambra</option>
                <option value="Adamawa">Adamawa</option>
                <option value="Akwa Ibom">Akwa Ibom</option>
                <option value="Bauchi">Bauchi</option>
                <option value="Bayelsa">Bayelsa</option>
                <option value="Benue">Benue</option>
                <option value="Borno">Borno</option>
                <option value="Cross River">Cross River</option>
                <option value="Delta">Delta</option>
                <option value="Ebonyi">Ebonyi</option>
                <option value="Edo">Edo</option>
                <option value="Ekiti">Ekiti</option>
                <option value="Enugu">Enugu</option>
                <option value="Feral Capital Territory">Feral Capital Territory(FCT)</option>
                <option value="Gombe">Gombe</option>
                <option value="Imo">Imo</option>
                <option value="Jigawa">Jigawa</option>
                <option value="Kaduna">Kaduna</option>
                <option value="Kano">Kano</option>
                <option value="Katsina">Katsina</option>
                <option value="Kebbi">Kebbi</option>
                <option value="Kogi">Kogi</option>
                <option value="Kwara">Kwara</option>
                <option value="Lagos">Lagos</option>
                <option value="Nasarawa">Nasarawa</option>
                <option value="Niger">Niger</option>
                <option value="Ogun">Ogun</option>
                <option value="Ondo">Ondo</option>
                <option value="Osun">Osun</option>
                <option value="Oyo">Oyo</option>
                <option value="Plateau">Plateau</option>
                <option value="Rivers">Rivers</option>
                <option value="Sokoto">Sokoto</option>
                <option value="Taraba">Taraba</option>
                <option value="Yobe">Yobe</option>
                <option value="Zamfara">Zamfara</option>
            </select><br><br>

        <!-- Hobbies -->

        <label>Hobbies:</label>
        <label for="Golf">Golf</label>
            <input type="checkbox" 
                name="checkbox" 
                id="Golf">
        <label for="Football">Football</label>
            <input type="checkbox" 
                name="checkbox" 
                id="Football">
        <label for="Tennis">Tennis</label>
            <input type="checkbox" 
                name="checkbox" 
                id="Tennis">
        <label for="Others">Others</label>
            <input type="checkbox" 
                name="checkbox" 
                id="Others"><br><br>

        <!-- Date Of Birth -->

        <label for="birthdate">Date Of Birth: </label>
            <input type="date"
                id="birthdate"
                name="birthdate"><br><br>

        <label for="Comment">Comment:</label>
            <input type="text" style="height: 70px;" size="70"
            
                placeholder="Enter a comment (Optional)"><br><br>
        <input type="submit"
            value="Submit">
        <input type="reset"
            value="Reset">
     </form>
</body>
</html>
